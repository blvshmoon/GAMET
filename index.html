<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Spin Game 🎡</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css">

  <!-- 🔥 BACKUP NEON (biar pasti muncul) -->
  <style>
    h1 {
      text-shadow:
        0 0 5px #ff69b4,
        0 0 10px #ff69b4,
        0 0 20px #ff1493,
        0 0 40px #ff1493;
    }

    canvas {
      box-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff69b4,
        0 0 40px #ff1493,
        0 0 60px #ff1493;
    }

    #spinBtn {
      box-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff1493;
    }

    .popup-content {
      box-shadow:
        0 0 10px #ff69b4,
        0 0 20px #ff69b4,
        0 0 40px #ff1493;
    }
  </style>

</head>

<body>

  <h1>🎡 SPIN GAME</h1>

  <div class="pointer"></div>

  <canvas id="wheel"></canvas>

  <button id="spinBtn">Spin 💫</button>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h2 id="popupName"></h2>
      <p id="popupText"></p>
      <button onclick="closePopup()">OK 💗</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
